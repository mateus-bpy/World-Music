name: Weekly Soundmap Update

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC
  workflow_dispatch:       # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python fetch_spotify_data.py

      - name: Run Notion updater
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_LANDING_PAGE_ID: ${{ secrets.NOTION_LANDING_PAGE_ID }}
        run: python update_notion.py

      - name: Commit updated block IDs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add highlights_block_id.json country_block_ids.json
          git diff --staged --quiet || git commit -m "Update block IDs"
          git push
